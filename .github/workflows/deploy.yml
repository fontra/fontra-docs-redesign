name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Check expected outputs
        run: |
          for f in index.html \
                   docs-redesign/index.html \
                   docs-redesign/get-started.html \
                   docs-redesign/tutorial-first-font.html \
                   docs-redesign/reference.html \
                   docs-redesign/assets/style.css \
                   docs-redesign/assets/app.js \
                   workflow/ui-mockup.html; do
            test -f "_site/$f" || { echo "MISSING _site/$f"; exit 1; }
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
